<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe ML Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;500&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --green: #00e676;
    --green-dim: #0d2a1a;
    --red: #ff5252;
    --red-dim: #2a0d0d;
    --amber: #ffab40;
    --amber-dim: #2a1a00;
    --text: #e8e8e8;
    --muted: #555;
    --muted2: #888;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }
 
  header {
    text-align: center;
    padding: 2rem 0 2.5rem;
  }
 
  header h1 {
    font-family: var(--mono);
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    font-weight: 600;
    color: var(--green);
    letter-spacing: -0.02em;
  }
 
  header p {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-family: var(--mono);
  }
 
  .tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
 
  .tab {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.55rem 1.4rem;
    background: transparent;
    color: var(--muted);
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.04em;
  }
 
  .tab:not(:last-child) { border-right: 1px solid var(--border); }
  .tab.active { background: var(--surface); color: var(--green); }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--muted2); }
 
  .panel { display: none; width: 100%; max-width: 420px; flex-direction: column; gap: 1rem; }
  .panel.active { display: flex; }
 
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.4rem;
  }
 
  .card-title {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
 
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
 
  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted2);
    margin-bottom: 0.35rem;
    font-family: var(--mono);
  }
 
  .field input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
 
  .field input[type="number"]:focus { border-color: var(--green); }
 
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
 
  .btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    border: 1px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.04em;
    flex: 1;
  }
 
  .btn:hover:not(:disabled) { background: var(--green); color: #000; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
 
  .btn-ghost { border-color: var(--border); color: var(--muted2); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
 
  .btn-row { display: flex; gap: 0.7rem; }
 
  .progress-wrap { margin-top: 1.2rem; }
 
  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
 
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.2s linear;
  }
 
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted2);
  }
 
  #train-status {
    margin-top: 0.8rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted2);
    min-height: 1rem;
  }
 
  #train-status.ok   { color: var(--green); }
  #train-status.warn { color: var(--amber); }
 
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
  }
 
  .stat {
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.7rem;
    text-align: center;
  }
 
  .stat-val {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    display: block;
  }
 
  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    font-family: var(--mono);
    display: block;
    margin-top: 0.2rem;
  }
 
  .server-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted2);
    margin-bottom: 1.2rem;
  }
 
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
 
  .dot.online  { background: var(--green); }
  .dot.offline { background: var(--red); }
 
  #play-panel { align-items: center; }
 
  #status-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
 
  #status {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.38rem 0.85rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
  }
 
  #status.your-turn { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  #status.bot-turn  { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  #status.you-win   { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  #status.bot-wins  { border-color: var(--red);   color: var(--red);   background: var(--red-dim); }
  #status.draw      { border-color: var(--muted); color: var(--muted2); }
  #status.no-model  { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
 
  #score-display { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
 
  #board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    aspect-ratio: 1;
  }
 
  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: clamp(2rem, 10vw, 3.5rem);
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
 
  .cell:hover:not(.taken) { border-color: var(--green); background: var(--green-dim); }
  .cell.taken  { cursor: default; }
  .cell.x      { color: var(--red);   border-color: #3d1a1a; }
  .cell.o      { color: var(--green); border-color: #1a3d2b; }
  .cell.win-cell { background: var(--amber-dim) !important; border-color: var(--amber) !important; }
 
  #play-btn-row { display: flex; gap: 0.7rem; width: 100%; }
</style>
</head>
<body>
 
<header>
  <h1>// tic-tac-toe ml bot</h1>
  <p>Q-Learning · Python backend</p>
</header>
 
<div class="tabs">
  <button class="tab active" id="tab-train" onclick="switchTab('train')">train</button>
  <button class="tab" id="tab-play"  onclick="switchTab('play')">play</button>
</div>
 
<!-- TRAIN PANEL -->
<div class="panel active" id="train-panel">
  <div class="card">
    <div class="server-row">
      <div class="dot" id="server-dot"></div>
      <span id="server-label">connecting to server...</span>
    </div>
 
    <div class="card-title">training config</div>
    <div class="field-row">
      <div class="field">
        <label>episodes</label>
        <input type="number" id="episodes-input" value="100000" min="1000" step="10000">
      </div>
      <div class="field">
        <label>learning rate α</label>
        <input type="number" id="alpha-input" value="0.5" min="0.01" max="1" step="0.05">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>discount γ</label>
        <input type="number" id="gamma-input" value="0.9" min="0.1" max="1" step="0.05">
      </div>
      <div class="field">
        <label>ε decay</label>
        <input type="number" id="decay-input" value="0.9995" min="0.999" max="0.9999" step="0.0001">
      </div>
    </div>
 
    <div class="btn-row">
      <button class="btn" id="train-btn" onclick="startTraining()">start training</button>
      <button class="btn btn-ghost" id="stop-btn" onclick="stopTraining()" disabled>stop</button>
    </div>
 
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-bg"><div id="progress-bar"></div></div>
      <div class="progress-label">
        <span id="prog-eps">0 episodes</span>
        <span id="prog-pct">0%</span>
      </div>
    </div>
 
    <div id="train-status"></div>
  </div>
 
  <div class="card">
    <div class="card-title">model stats</div>
    <div class="stat-grid">
      <div class="stat">
        <span class="stat-val" id="stat-entries">—</span>
        <span class="stat-label">q entries</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-eps-done">—</span>
        <span class="stat-label">episodes</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-epsilon">—</span>
        <span class="stat-label">epsilon</span>
      </div>
    </div>
  </div>
</div>
 
<!-- PLAY PANEL -->
<div class="panel" id="play-panel">
  <div id="status-bar">
    <div id="status" class="no-model">train the bot first</div>
    <div id="score-display">W: <span id="sw">0</span> · L: <span id="sl">0</span> · D: <span id="sd">0</span></div>
  </div>
 
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
 
  <div id="play-btn-row">
    <button class="btn" onclick="resetGame()">new game</button>
  </div>
</div>
 
<script>
const API = 'https://web-production-54e94.up.railway.app';
 
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-panel').classList.add('active');
}
 
// ── Server health ────────────────────────────────────────────────────
async function checkServer() {
  try {
    const data = await (await fetch(API + '/stats')).json();
    document.getElementById('server-dot').className = 'dot online';
    document.getElementById('server-label').textContent = 'server online · localhost:5000';
    updateStats(data.q_entries, null, data.epsilon);
    if (data.trained) setStatus('your-turn', 'your move (O)');
  } catch {
    document.getElementById('server-dot').className = 'dot offline';
    document.getElementById('server-label').textContent = 'server offline — run: python server.py';
  }
}
 
// ── Training ─────────────────────────────────────────────────────────
let pollInterval = null;
 
async function startTraining() {
  const episodes = parseInt(document.getElementById('episodes-input').value);
  const alpha    = parseFloat(document.getElementById('alpha-input').value);
  const gamma    = parseFloat(document.getElementById('gamma-input').value);
  const decay    = parseFloat(document.getElementById('decay-input').value);
 
  try {
    const res = await fetch(API + '/train', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episodes, alpha, gamma, epsilon_decay: decay })
    });
    if (!res.ok) { setTrainStatus((await res.json()).error, 'warn'); return; }
 
    document.getElementById('train-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('progress-wrap').style.display = 'block';
    setTrainStatus('training...', '');
    pollInterval = setInterval(pollProgress, 600);
  } catch {
    setTrainStatus('cannot reach server — is python server.py running?', 'warn');
  }
}
 
async function stopTraining() {
  await fetch(API + '/stop', { method: 'POST' });
  clearInterval(pollInterval);
  document.getElementById('train-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
  setTrainStatus('stopped early — progress saved', 'warn');
}
 
async function pollProgress() {
  try {
    const data = await (await fetch(API + '/progress')).json();
    const pct = data.total_episodes > 0
      ? Math.round((data.episodes_done / data.total_episodes) * 100) : 0;
 
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('prog-eps').textContent = data.episodes_done.toLocaleString() + ' episodes';
    document.getElementById('prog-pct').textContent = pct + '%';
    updateStats(data.q_entries, data.episodes_done, data.epsilon);
 
    if (!data.running) {
      clearInterval(pollInterval);
      document.getElementById('train-btn').disabled = false;
      document.getElementById('stop-btn').disabled = true;
      setTrainStatus('training complete · model saved to qtable.pkl', 'ok');
    }
  } catch {
    clearInterval(pollInterval);
    setTrainStatus('lost connection to server', 'warn');
  }
}
 
function setTrainStatus(msg, cls) {
  const el = document.getElementById('train-status');
  el.textContent = msg;
  el.className = cls;
}
 
function updateStats(entries, epsDone, epsilon) {
  if (entries  !== null && entries  !== undefined) document.getElementById('stat-entries').textContent  = entries.toLocaleString();
  if (epsDone  !== null && epsDone  !== undefined) document.getElementById('stat-eps-done').textContent = (data.total_episodes_ever || epsDone).toLocaleString();
  if (epsilon  !== null && epsilon  !== undefined) document.getElementById('stat-epsilon').textContent  = epsilon.toFixed(3);
}
 
// ── Game ─────────────────────────────────────────────────────────────
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board = Array(9).fill(0);
let gameOver = false;
let yourTurn = true;
let score = { w: 0, l: 0, d: 0 };
 
function available(b) { return b.map((v,i) => v === 0 ? i : -1).filter(i => i >= 0); }
 
function checkWinner(b) {
  for (const [a,c,d] of WINS)
    if (b[a] !== 0 && b[a] === b[c] && b[c] === b[d]) return { winner: b[a], line: [a,c,d] };
  return null;
}
 
async function playerMove(i) {
  if (gameOver || !yourTurn || board[i] !== 0) return;
  board[i] = -1;
  yourTurn = false;
  renderBoard();
  const result = checkWinner(board);
  if (result)              { endGame('you', result.line); return; }
  if (!available(board).length) { endGame('draw'); return; }
  setStatus('bot-turn', 'bot thinking...');
  await botMove();
}
 
async function botMove() {
  try {
    await new Promise(r => setTimeout(r, 320));
    const data = await (await fetch(API + '/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ board })
    })).json();
 
    if (data.error) { setStatus('no-model', 'train the bot first'); yourTurn = true; return; }
    board[data.move] = 1;
    renderBoard();
    const result = checkWinner(board);
    if (result)              { endGame('bot', result.line); return; }
    if (!available(board).length) { endGame('draw'); return; }
    yourTurn = true;
    setStatus('your-turn', 'your move (O)');
  } catch {
    setStatus('no-model', 'server offline');
    yourTurn = true;
  }
}
 
function renderBoard() {
  document.querySelectorAll('.cell').forEach((el, i) => {
    el.className = 'cell';
    el.textContent = '';
    if (board[i] === 1)  { el.textContent = 'X'; el.classList.add('x', 'taken'); }
    if (board[i] === -1) { el.textContent = 'O'; el.classList.add('o', 'taken'); }
  });
}
 
function endGame(who, line) {
  gameOver = true;
  if (line) line.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win-cell'));
  if (who === 'you') { score.w++; setStatus('you-win', 'you win!'); }
  else if (who === 'bot') { score.l++; setStatus('bot-wins', 'bot wins'); }
  else { score.d++; setStatus('draw', "it's a draw"); }
  document.getElementById('sw').textContent = score.w;
  document.getElementById('sl').textContent = score.l;
  document.getElementById('sd').textContent = score.d;
}
 
function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = text;
}
 
function resetGame() {
  board = Array(9).fill(0);
  gameOver = false;
  yourTurn = true;
  renderBoard();
  setStatus('your-turn', 'your move (O)');
}
 
document.querySelectorAll('.cell').forEach(el => {
  el.addEventListener('click', () => playerMove(+el.dataset.i));
});
 
checkServer();
setInterval(checkServer, 10000);
</script>
</body>
</html>
